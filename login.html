<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Socios - GCO</title>
    
    <style>
        :root {
            --color-principal: #2E7D32;
            --color-secundario: #F5F5F5;
            --color-texto: #333333;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--color-secundario);
            color: var(--color-texto);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--color-principal);
            color: white;
            padding: 1rem 20px;
            text-align: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            color: white;
            display: inline-block;
        }

        .logo:hover {
            color: #e8f5e9;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 40px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 {
            margin-top: 0;
            color: var(--color-principal);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn-login {
            background-color: var(--color-principal);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s;
        }

        .btn-login:hover {
            background-color: #1b5e20;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">← Volver a GCO</a>
    </header>

    <div class="login-container">
        <div class="login-card">
            <h2>Acceso Privado</h2>
            <p>Ingresa tus credenciales para acceder a tu panel.</p>
            
            <form id="formulario-login">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>
                
                <button type="submit" class="btn-login">Ingresar al Sistema</button>
            </form>
            
            <div style="text-align: center; margin-top: 20px; font-size: 0.9rem; line-height: 1.8;">
                <a href="#" onclick="recuperarContrasena(event)" style="color: #555; text-decoration: none; font-weight: 500;">¿Olvidaste tu contraseña?</a>
                <br>
                ¿Eres un nuevo criador? <a href="registro.html" style="color: #1565C0; font-weight: bold; text-decoration: none;">Solicita tu cuenta aquí</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://wbgjkkzputlnzpjcullm.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndiZ2pra3pwdXRsbnpwamN1bGxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNzIxMzAsImV4cCI6MjA5Nzc0ODEzMH0.KQ8hYIHJGPTkGA47ajgtr1T0RaS7JBA45StAE2oM1-U';
        const clienteSupabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const CORREO_ADMINISTRADOR = "dtangperez77@gmail.com"; 

        // LÓGICA DE INGRESO MAESTRO
        document.getElementById('formulario-login').addEventListener('submit', async function(evento) {
            evento.preventDefault(); 
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.querySelector('.btn-login');
            
            btn.textContent = "Verificando...";
            
            const { data, error } = await clienteSupabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert("Error de acceso: " + error.message);
                btn.textContent = "Ingresar al Sistema";
            } else {
                if (email.toLowerCase() === CORREO_ADMINISTRADOR.toLowerCase().trim()) {
                    window.location.href = "admin.html"; 
                } else {
                    window.location.href = "aviario.html"; 
                }
            }
        });

        // 🛠️ FUNCIÓN DE RECUPERACIÓN LINKADA A RESTABLECER.HTML
        window.recuperarContrasena = async function(e) {
            e.preventDefault();
            
            const correo = prompt("Ingresa el correo electrónico con el que te registraste en la GCO:");
            if (!correo || correo.trim() === "") return;

            try {
                const { error } = await clienteSupabase.auth.resetPasswordForEmail(correo.trim(), {
                    redirectTo: window.location.origin + '/restablecer.html',
                });

                if (error) {
                    alert("Error al procesar la solicitud: " + error.message);
                } else {
                    alert("¡Enlace enviado! Hemos remitido un mensaje a tu bandeja de entrada para que configures tu nueva contraseña.");
                }
            } catch (err) {
                alert("Error de red: " + err.message);
            }
        }
    </script>
</body>
</html>
